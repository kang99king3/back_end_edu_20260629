<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>

    <script>
        //생성자함수로 만들기: this예약어 사용해서 선언..
        function Lotto() {
            //로또 번호를 저장할 배열을 선언
            this.balls = [];

            //로또번호 랜덤생성 메서드
            this.makeBall = () => {
                //1~45까지의 숫자를 랜덤생성하는 기능
                //random(): 0~1사이의 실수를 랜덤하게 반환
                console.log("랜덤생성:", Math.random());
                return Math.floor(Math.random() * 45) + 1;
            }

            //배열에 저장하는 메서드
            this.lottoBalls = () => {
                let count = 0;
                while (count < 7) {
                    let ball = this.makeBall();//랜덤숫자생성
                    // if (this.balls.indexOf(ball) == -1) { //구버전과 호환성을 고려할 경우 사용
                    if (!this.balls.includes(ball)) { //최신 자바스크립트 문법, 직관적인 해석
                        this.balls.push(ball);//배열에 저장
                        count++;
                    }
                }
            }
        }

        function lottoPrint() {
            const lotto = new Lotto();
            // lotto.makeBall();
            lotto.lottoBalls();
            console.log(lotto.balls.toString());
            //실습문제: 7개 번호가 담긴 배열에서 
            //        보너스번호 따로 저장, 그 이후에 6개를 정렬시키기
            //  출력: 1-2-3-4-5-6  , 보너스번호 7
            //활용 메서드: shift(), pop(), join()
            //           DOM탐색메서드, innerHTML, textContent

            const balls = lotto.balls;
            const bonus = balls.pop();// balls[1,2,3,4,5,6] bonus=7

            //정렬 처리하기
            balls.sort((a, b) => a - b);//크기순 정렬하기
            //출력폼 만들기 -> 문자열로 변환
            let strBalls = balls.join("-");//"1-2-3-4-5-6"
            console.log(strBalls, bonus);

            const spans = document.querySelectorAll("span");//[s,s,s,s]
            spans[1].innerHTML = `<strong>${strBalls}</strong>`;
            spans[3].innerHTML = `<strong>${bonus}</strong>`;
        }
    </script>
</head>

<body>
    <fieldset>
        <legend>로또번호 생성하기</legend>
        <span>로또번호:</span>
        <span>예시)1-3-4-15-20-22</span>
        <span>보너스번호:</span>
        <span>예시)21</span>
        <button onclick="lottoPrint()">생성</button>
    </fieldset>
</body>

</html>
