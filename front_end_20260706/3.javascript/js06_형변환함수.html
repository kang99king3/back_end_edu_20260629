<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        function numTest() {
            const inputObj = document.getElementById("num1");
            // "1234"+20 --> concatenation이 발생
            // 문자열을 +연산으로 만나면 문자열로 자동 변환해서 연산된다
            console.log(typeof inputObj.value,
                Number(inputObj.value) + 20
            );
        }

        //파라미터로 객체를 전달할 수 도 있다
        function intTest(inputObj) {
            console.log(inputObj.nodeName)
            let paramVal = parseInt(inputObj.value);
            console.log(paramVal + 100);
        }

        function floatTest(inputObj) {
            let parseVal = parseFloat(inputObj.value);
            console.log(parseVal + 20);
        }
        function evalTest(inputObj) {
            let eValue = inputObj.value;// "5+10"
            console.log(eval(eValue));

            //id가 result인 요소를 탐색해서 계산결과를 출력
            document.querySelectorAll("#result")[0]
                .textContent = eval(eValue);
        }
    </script>
</head>

<body>
    <h1>1.숫자형 형변환 Number()함수</h1>
    <input type="text" name="num" id="num1" value="1234" />
    <button onclick="numTest()">확인</button>

    <h1>2.정수형 형변환 parseInt()함수</h1>
    <input type="text" name="int" id="int1" />
    <button onclick="intTest(int1)">확인</button>

    <h1>3.실수형 형변환 parsefloat()함수</h1>
    <input type="text" name="float" id="float1" />
    <button onclick="floatTest(float1)">확인</button>

    <h1>4.검증함수 eval()함수</h1>
    <p>문자열로 된 값을 자바스크립트 코드로 변환해서 실행시켜주는 함수</p>
    <input type="text" name="evalue" id="evalue1" placeholder="입력예) 5+10" />
    <button onclick="evalTest(evalue1)">확인</button>
    <span>계산결과:</span><span id="result"></span>
</body>

</html>
