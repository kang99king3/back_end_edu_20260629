<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        function strTest01() {
            //리터럴 방식
            //표현하는 방법: "ST", 'ST'
            let string01 = "String";
            let string02 = "Test";

            //+연산자를 사용해서 문자열 합치기
            //concatenation: +연산자를 만나면 모두 문자열로 변환해서 연산
            let string03 = string01 + string02;// 5+5=10

            //concat():여러 문자열 합칠때 사용
            let newString = "String".concat("test", "java", "script");
            document.querySelectorAll(".result")[0].textContent = newString;
        }

        function strTest02() {
            //동등연산자  == (일반적인 비교) , === (엄격한 비교)

            // == : 타입을 같게 변환시켜서 비교한다.
            // a == b : 둘중 더 원시적이거나 기준이되는 값의 타입으로 알아서 변환
            let numVal = 10;//숫자형

            if (numVal == "10") {
                console.log("==연산자사용:값이 같습니다.")
            }

            if (numVal === "10") {
                console.log("===연산자사용:값이 같습니다.")
            } else {
                console.log("===연산자사용: 값이 같지 않습니다.")
            }

            //객체와 비교(String)
            let strLit = "한경";
            let strObj = new String("한경");// new 객체 정의

            if (strLit == strObj) {
                console.log("==같다");
            }
            // === : 타입변환을 하지 않고 비교한다.
            if (strLit === strObj) {
                console.log("===같다");
            } else {
                console.log("===다르다");
            }
        }

        function strTest03() {
            //"indexOf()메서드" "substring()메서드" 를 각각 추출
            let strVal = "문자열 추출하기. 관련 메서드:indexOf()메서드, substring()메서드.";
            let sIdx = strVal.indexOf(":");// ":"의 인덱스 위치 검색
            let eIdx = strVal.lastIndexOf(".");// "."의 인덱스 위치 검색
            let result = strVal.substring(sIdx + 1, eIdx);//"indexOf()메서드, substring()메서드"
            let splitVal = result.split(",");//["inde.."," sub.."]
            console.log(splitVal.toString())
            let strVal01 = splitVal[0].trim();//앞뒤공백제거
            let strVal02 = splitVal[1].trim();
            console.log(strVal01, strVal02);

            //요소에 출력하기
            document.getElementById("re1").textContent = strVal01;
            document.getElementById("re2").textContent = strVal02;
        }       
    </script>
</head>

<body>
    <h1>String 객체의 사용</h1>
    <h2>문자열 합치기<button onclick="strTest01()">확인</button> </h2>
    <p class="result"></p>
    <h2>문자열 비교하기<button onclick="strTest02()">확인</button> </h2>
    <p class="result"></p>
    <h2>문자열 검색하기: indexOf()/lastIndexOf():일치하는 단어(해당인덱스반환)
        일치하는 단어X(-1을 반환)
    </h2>
    <h2>문자열 추출하기: substring()-문자열 시작인덱스~종료인덱스
        split()-문자열에 토큰으로 나눠서 배열로 반환("a,b,c,d"->[a,b,c,d])
        <button onclick="strTest03()">확인</button>
    </h2>
    <p class="result"><span id="re1"></span><br /><span id="re2"></span></p>
</body>

</html>
