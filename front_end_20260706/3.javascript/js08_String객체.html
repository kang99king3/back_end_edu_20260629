<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        function strTest01() {
            //리터럴 방식
            //표현하는 방법: "ST", 'ST'
            let string01 = "String";
            let string02 = "Test";

            //+연산자를 사용해서 문자열 합치기
            //concatenation: +연산자를 만나면 모두 문자열로 변환해서 연산
            let string03 = string01 + string02;// 5+5=10

            //concat():여러 문자열 합칠때 사용
            let newString = "String".concat("test", "java", "script");
            document.querySelectorAll(".result")[0].textContent = newString;
        }


    </script>
</head>

<body>
    <h1>String 객체의 사용</h1>
    <h2>문자열 합치기<button onclick="strTest01()">확인</button> </h2>
    <p class="result"></p>
    <h2>문자열 비교하기<button onclick="strTest02()">확인</button> </h2>
    <p class="result"></p>
    <h2>문자열 검색하기: indexOf()/lastIndexOf():일치하는 단어(해당인덱스반환)
        일치하는 단어X(-1을 반환)
    </h2>
    <h2>문자열 추출하기: substring()-문자열 시작인덱스~종료인덱스
        split()-문자열에 토큰으로 나눠서 배열로 반환("a,b,c,d"->[a,b,c,d])
        <button onclick="strTest03()">확인</button>
    </h2>
    <p class="result"><span id="re1"></span><br /><span id="re2"></span></p>
</body>

</html>
