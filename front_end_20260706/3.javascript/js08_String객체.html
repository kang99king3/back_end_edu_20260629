<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        function strTest01() {
            //리터럴 방식
            //표현하는 방법: "ST", 'ST'
            let string01 = "String";
            let string02 = "Test";

            //+연산자를 사용해서 문자열 합치기
            //concatenation: +연산자를 만나면 모두 문자열로 변환해서 연산
            let string03 = string01 + string02;// 5+5=10

            //concat():여러 문자열 합칠때 사용
            let newString = "String".concat("test", "java", "script");
            document.querySelectorAll(".result")[0].textContent = newString;
        }

        function strTest02() {
            //동등연산자  == (일반적인 비교) , === (엄격한 비교)

            // == : 타입을 같게 변환시켜서 비교한다.
            // a == b : 둘중 더 원시적이거나 기준이되는 값의 타입으로 알아서 변환
            let numVal = 10;//숫자형

            if (numVal == "10") {
                console.log("==연산자사용:값이 같습니다.")
            }

            if (numVal === "10") {
                console.log("===연산자사용:값이 같습니다.")
            } else {
                console.log("===연산자사용: 값이 같지 않습니다.")
            }

            //객체와 비교(String)
            let strLit = "한경";
            let strObj = new String("한경");// new 객체 정의

            if (strLit == strObj) {
                console.log("==같다");
            }
            // === : 타입변환을 하지 않고 비교한다.
            if (strLit === strObj) {
                console.log("===같다");
            } else {
                console.log("===다르다");
            }

            //match 함수 사용 : 비교 패턴은 정규화표현식 사용
            let strVal = prompt("당신의 회사명은?", "");
            // isNaN()함수: 숫자인지 판단하는 함수
            if (strVal.match(/[0-9]/)) { //0~9사이의 값이 포함되어 있으면 true
                alert("숫자는 포함하면 안되요");
            } else {
                console.log(`회사명은 ${strVal}입니다.`);
            }

        }

        function strTest03() {
            //"indexOf()메서드" "substring()메서드" 를 각각 추출
            let strVal = "문자열 추출하기. 관련 메서드:indexOf()메서드, substring()메서드.";
            let sIdx = strVal.indexOf(":");// ":"의 인덱스 위치 검색
            let eIdx = strVal.lastIndexOf(".");// "."의 인덱스 위치 검색
            let result = strVal.substring(sIdx + 1, eIdx);//"indexOf()메서드, substring()메서드"
            let splitVal = result.split(",");//["inde.."," sub.."]
            console.log(splitVal.toString())
            let strVal01 = splitVal[0].trim();//앞뒤공백제거
            let strVal02 = splitVal[1].trim();
            console.log(strVal01, strVal02);

            //요소에 출력하기
            document.getElementById("re1").textContent = strVal01;
            document.getElementById("re2").textContent = strVal02;
        }




        let count = 5;
        function strTest04() {
            //문제: 입력 키워드 최대 6개로 제한
            //입력된 문자열 각각의 키워드를 추출해서 <span>요소에 출력하세요
            //(prompt()대화창으로 입력받은 키워드를 아래 문자열 형식으로 만들어서 
            // 화면에 id=key인 span요소 내부에 출력하기)
            //출력하는 형식: 
            //"<br>키워드:수박<br/>키워드:바나나<br/>키워드:사과" -->span요소에 출력
            let prop = prompt("쉼표로 구분하여 키워드를 입력하세요", "예)수박,바나나,사과");
            console.log(prop)
            //split()사용
            let props = prop.split(",");
            if (props.length > count) {
                alert(`${count}개까지만 입력 가능합니다.`);
            } else {
                let result = "";
                for (let i = 0; i < props.length; i++) {
                    result += `<br/>키워드:${props[i]}`;
                }

                //DOM탐색해서 만든 문자열을 요소 내부에 출력
                // -> 문자열에 태그가 포함, 표현한다면 -> innerHTML
                document.querySelectorAll("#key")[0].innerHTML = result;
            }
        }

        //입력 키워드 개수를 제한하는 기능 구현
        // 10개 제한 -> 개수를 저장하는 변수선언(전역변수? 지역변수?)
        function numCount() {
            // count변수에 제한 개수(숫자입력박스값)를 저장
            count = document.querySelectorAll("#num")[0].value;

            document.querySelectorAll("fieldset > button")[0]
                .style.color = "red";

        }
    </script>
</head>

<body>
    <h1>String 객체의 사용</h1>
    <h2>문자열 합치기<button onclick="strTest01()">확인</button> </h2>
    <p class="result"></p>
    <h2>문자열 비교하기<button onclick="strTest02()">확인</button> </h2>
    <p class="result"></p>
    <h2>문자열 검색하기: indexOf()/lastIndexOf():일치하는 단어(해당인덱스반환)
        일치하는 단어X(-1을 반환)
    </h2>
    <h2>문자열 추출하기: substring()-문자열 시작인덱스~종료인덱스
        split()-문자열에 토큰으로 나눠서 배열로 반환("a,b,c,d"->[a,b,c,d])
        <button onclick="strTest03()">확인</button>
    </h2>
    <p class="result"><span id="re1"></span><br /><span id="re2"></span></p>

    <hr />
    <h2>키워드 나누기<button onclick="strTest04()">클릭</button></h2>
    <span id="key">

    </span>
    <hr>
    <fieldset>
        <label>최대입력수:</label>
        <input type="number" id="num" min="1" />
        <button onclick="numCount()">설정</button>
        <br />
        <small>사용자가 최대입력수를 입력하고 설정버튼을 클릭하면 적용:
            설정버튼의 폰트색을 red로 변경</small>
    </fieldset>
</body>

</html>
