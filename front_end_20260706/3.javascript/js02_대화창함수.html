<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        //확인버튼 제공
        function alertTest() {
            alert("단순히 메시지만 출력하는 창");
        }
        //확인,취소버튼 제공: 반환값 boolean
        function confirmTest() {
            if (confirm("정말 삭제하시겠습니까?")) {
                console.log("삭제를 진행합니다.");
            } else {
                console.log("삭제를 취소합니다.");
            }
        }

        //text입력박스, 확인/취소 버튼을 제공
        //입력하면 텍스트 반환, 취소버튼을 클릭하면 null을 반환
        function promptTest() {
            var txt = prompt("과목을 선택하세요(1:java,2:DB,3.JS)", "해당번호입력!");
            console.log("입력된 값:", txt, typeof txt);

            switch (txt) {
                case "1": console.log("자바를 선택했군!"); break;
                case "2": console.log("DB를 선택했군!"); break;
                case "3": console.log("JS를 선택했군!"); break;
                case null: console.log("취소했군"); break;
                default: console.log("다시 입력하세요");
            }

            document.getElementById("inputVal").textContent = txt;
        }
    </script>
</head>

<body>
    <h1>대화창 함수 사용하기</h1>
    <small>*종류는 <storng>alert(),confirm(),prompt()</storng>가 있다</small>
    <p>alert():<button onclick="alertTest();">클릭!</button></p>
    <p>confirm():<button onclick="confirmTest();">클릭!</button></p>
    <p>prompt():<button onclick="promptTest()">클릭!</button>
        <span id="inputVal"></span>
    </p>
</body>

</html>
