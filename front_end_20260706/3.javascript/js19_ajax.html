<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        function ajaxGet() {
            const xhr = new XMLHttpRequest();
            //https://hankyung.com?/content/data.json
            let params = "num=1&id=hk";
            //  (요청방식,  요청주소,  비동기처리여부)
            xhr.open("GET", `data.json?${params}`, true);

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status == 200) {
                    let data = JSON.parse(xhr.responseText);//JS객체로 변환
                    console.log(data.id, data.name);
                    document.querySelector("#result").innerHTML =
                        `<p>${data.id}</p>
                        <p>${data.name}</p>
                        <p>${data.addr}</p>`

                }
            }

            //요청을 서버로 전송
            xhr.send();
        }

        /*  콜백 지옥 발생 상황
            글목록을 조회 -> 글상세내용을 조회 -> 글 수정  연속적인 요청 처리
            getBoardList(,function(){
                            getBoard(,function(){
                                updateBoard(,function(){
                                    deleteBoard()
                                })
                            })
                        })
        */
        //Promise 객체가 해결~
        //비동기 작업의 성공/실패에 대한 객체를 반환해서 then()으로 받아서 처리
        //   콜백지옥의 들여쓰기를 제거할 수 있게 된다.
        // getBoardList().then(
        // (res) => {res return re; }
        //                 ).then()
        //                  .then()
        function promiseTest(method, url, data = null) {//파라미터 초기값 설정 가능
            return new promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                // const params = "num=1&id=hk";
                xhr.open(method, url, true);

                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4 && xhr.status == 200) {
                        resolve(xhr.responseText);
                    } else {
                        reject(new Error("요청실패:" + xhr.status));
                    }
                }

                //요청을 서버로 전송
                xhr.send();
            });//promise 종료
        }

        function ajaxPromise() {
            promiseTest("GET", "data.json")
                .then((response) => {
                    const data = JSON.parse(response);//JS객체로 변환
                    document.querySelector("#result").innerHTML =
                        `<p>${data.id}</p>
                    <p>${data.name}</p>
                    <p>${data.addr}</p>`
                    return data;
                }).then(
                    (res) => {

                    }
                ).catch(error => { console.error("실패") });
        }

        //promise 기반의 ajax처리하는 API -> fetch() 등장
        function ajaxFetch() {
            fetch("data.json").then((response) => {
                // JSON.parse(response);
                return response.json();// js객체
            })
                .then(data => {
                    document.querySelector("#result").innerHTML =
                        `<p>${data.id}</p>
                        <p>${data.name}</p>
                        <p>${data.addr}</p>`
                }).catch(error => {
                    console.log("실패");
                })
        }
    </script>
</head>

<body>
    <button onclick="ajaxGet()">Get방식</button>
    <div id="result"></div>
</body>

</html>
