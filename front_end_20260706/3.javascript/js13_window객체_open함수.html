<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        window.onload = function () {
            document.querySelector("#btn").onclick = function (e) {
                //파라미터 e는 현재 이벤트(onclick)을 의미함.
                e.target.style.backgroundColor = "red";
                // e.target.textContent = "테스트";

                let url = "js13_pop.html";
                let title = "팝업창페이지";
                let prop = "width=400px,height=400px,top=300px,left=200px";
                window.open(url, title, prop);
            }
        }
    </script>
</head>

<body>
    <h1>팝업창 만들기</h1>
    <input type="text" name="val01" />
    <button id="btn">팝업창</button>
    <h1>팝업창에서 전달되 값</h1>
    <input type="text" name="val02" />
</body>

</html>
