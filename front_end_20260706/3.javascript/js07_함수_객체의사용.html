<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        //선언적함수사용
        function func01_2(a, b) { //파라미터 선언
            console.log(a, ":", b)
            return a + b;//a+b의 결과값을 반환한다.
        }

        function func01() {
            console.log("선언적 함수")
            let val = func01_2(5, 10);
            console.log("결과값:", val);
        }

        //익명함수
        let i = 0;//전역변수
        const func02 = function () {
            console.log("익명함수");

            //setInterval(func,ms)
            // setInterval(function () {
            //     console.log(i++)
            // }, 1000);

            //화살표함수로 표현
            setInterval(() => { console.log(i++) }, 1000);

            // setInterval("test()", 1000);//함수를 문자열로 표현
            // setInterval(test, 1000);//함수의 이름만 작성
        }
        function test() {
            console.log(i++);
        }

        //객체생성하기
        //1.객체 리터럴 방식
        onload = function () {
            // [p,p,p,p]
            var pArray = document.getElementsByClassName("a");

            pArray[0].onclick = () => {
                console.log("객체리터럴방식");

                const jsonObj = {
                    subject: "javascript",
                    credit: 1,
                    // printout: function () {
                    //     return jsonObj.subject + "," + jsonObj.credit + "학점";
                    // }
                    printout: () => jsonObj.subject + "," + jsonObj.credit + "학점"
                }

                //객체에 정의된 메서드를 사용
                console.log("메서드 실행:", jsonObj.printout())

                //객체의 값 변경하는 경우
                jsonObj.subject = "JS"; //update개념
                jsonObj["test"] = "value"; //insert개념
                delete jsonObj["credit"]; //delete개념

                console.log(jsonObj["subject"], jsonObj.credit, jsonObj.test);
                //Clent와 Server간에 전송시 ; '{"a":"b","c":"d"...}' -> js객체 변환

                //ES6에서 추가된 새로운 기능
                //1.화살표함수: 기존 예제 참고
                //2.구조분해할당
                // - 직접 구조 분해하고 할당하는 코드
                let subjectLit = jsonObj.subject;
                let testLit = jsonObj.test;

                // - 구조분해할당 문법사용
                let { subject, test } = jsonObj;

                // - 템플릿 리터럴 문법 사용
                console.log(`${subject}와${test}를 출력합니다.`);

                // - spread 방식 -> 배열에서 확인

            }//onclick 객체리터럴 방식 종료

            //2.객체 생성자 함수 방식
            pArray[1].onclick = () => {
                const info = new Info();
                console.log("생성자함수방식:", info.printout()
                    , info.getTest());
            }

            //Info객체 정의
            //생성자 함수는 화살표함수로 정의(X)
            // const Info = () =>{ } 
            // funciton() 익명함수 등과 구현하는 방식이 다르다.
            //   --> 프로토타입이 없다
            function Info() {
                this.subject = "javascript";
                this.credit = 2;
                this.printout = () => {
                    return this.subject + "," + this.credit + "학점";
                }
                let test = "일반 변수 선언";//외부에서 접근X(은닉화)
                this.getTest = () => test;//내부에서 접근 가능
            }
        }// onload 종료

    </script>
</head>

<body>
    <h1>선언적함수</h1>
    <p>이름이 정의되어 있는 기본적인 함수
        <button onclick="func01()">확인</button>
    </p>
    <h1>익명함수</h1>
    <p>이름이 없는 함수
        <button onclick="func02()">확인</button>
    </p>
    <hr />
    <h1>자바스크립트 객체 만들기</h1>
    <p class="a">1.객체 리터럴 방식</p>
    <p class="a">2.객체 생성자 함수 방식</p>
    <p class="a">3.프로토타입 사용하기</p>
    <p class="a">4.클로져 사용하기</p>
</body>

</html>
