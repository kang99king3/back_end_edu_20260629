<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        function testDate01() {
            //오늘에 대한 객체가 생성
            const date = new Date();//default생성자
            const spanDate = document.getElementById("today");
            spanDate.textContent = date.toLocaleString();
        }

        function testDate02() {
            const date = new Date();
            let year = date.getFullYear();//년도
            let month = date.getMonth() + 1;//월(0~11월)
            let day = date.getDate();//일
            let week = date.getDay();//요일(0~6)

            const dayOfWeek = ["일", "월", "화", "수", "목", "금", "토"];
            console.log(`오늘날짜:${year}.${month}.${day}.${dayOfWeek[week]}`);
        }

        function testDate03() {
            // 날짜형식 : "yyyy-MM-dd hh:mm:ss"
            // const date = new Date("2026-07-18");
            const date = new Date(2026, 7 - 1, 18);
            document.getElementById("specific").textContent
                = date.toLocaleDateString();
        }

        function testDate04() {
            const date = new Date();
            const inputDate = document.getElementById("dates");
            inputDate.value = date.toLocaleDateString();

            //입력된 경과일 값을 구하기
            let inputVal = document.getElementById("inputDate").value;

            // 현재 날짜 + 경과일(입력값:10)
            // 일수 계산: 현재 날짜에 일수값을 구해서 +10을 한뒤 date에 다시 저장
            //      16  +  10  -> 16 + 20
            date.setDate(date.getDate() + parseInt(inputVal));
            document.getElementById("resultDate").value =
                date.toLocaleDateString();
        }

    </script>
</head>

<body>
    <h1>오늘 날짜 출력하기</h1>
    <span id="today"></span><br />
    <button onclick="testDate01()">오늘날짜</button>
    <button onclick="testDate02()">오늘날짜(표현방식설정)</button>

    <h1>특정 날짜 출력하기</h1>
    <span id="specific"></span>
    <button onclick="testDate03()">특정날짜</button>

    <h1>경과날짜구하기</h1>
    <label>현재날짜:</label><input type="text" id="dates" readonly="readonly" /><br />
    <label>경과일:</label><input type="number" id="inputDate" min="1" />일<br />
    <label>경과후 날짜:</label><input type="text" id="resultDate" readonly="readonly" /><br />
    <button onclick="testDate04()">경과날짜조회</button>

    <h1>D-Day기능</h1>
    <label>현재날짜:</label><input type="text" id="dates2" readonly="readonly" /><br />
    <label>수료일:</label><input type="date" id="d_day" /><br />
    <label>남은 일수:</label><input type="text" id="period" readonly="readonly" /><br />
    <button onclick="testDate05()">확인</button>
</body>

</html>
