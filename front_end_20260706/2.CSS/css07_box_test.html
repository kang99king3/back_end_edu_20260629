<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>박스모델 확인 문제</title>
    <style type="text/css">
        /* 여기에 CSS 코드를 완성하세요 */
        .card {
            /* 1. 가로 배치 설정 */
            display: inline-block;
            /* 2. 가로 250px, 세로 150px 설정 */
            width: 250px;
            height: 150px;
            /* 3. 패딩 15px, 테두리 5px 실선 설정 */
            padding: 15px;
            border: 5px solid #2c3e50;
            /* 4. 박스 크기 고정 설정 (box-sizing) */
            box-sizing: border-box;
            /* 5. 바깥 여백 20px 설정 */
            margin: 20px;
            /* 6. 수직 정렬 윗선 맞춤 설정 */
            vertical-align: top;
            background-color: #ecf0f1;
            /* 둥근 모서리 (옵션) */
            border-radius: 8px;
            /* p요소 중앙정렬 */
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <h2>레이아웃</h2>

    <div class="card">
        <p>Card1</p>
    </div>

    <div class="card">
        <p>Card2</p>
    </div>

</body>

</html>
