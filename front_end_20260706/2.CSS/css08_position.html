<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        #box,
        p {
            border: 1px solid black;
        }

        #box {
            width: 600px;
            height: 600px;
            position: relative;
            margin-left: 100px;
        }

        #box>p {
            width: 200px;
            height: 200px;
            border-radius: 100px;
            text-align: center;
            line-height: 200px;
            font-size: 40px;
        }

        .myred {
            background-color: red;
            position: absolute;
            left: 200px;
            top: 10px;
            z-index: 100;
        }

        .myblue {
            background-color: blue;
            position: absolute;
            left: 120px;
            top: 100px;
            z-index: 50;
        }

        .mygreen {
            background-color: green;
            position: absolute;
            left: 280px;
            top: 100px;
            z-index: 10;
        }

        .myred:hover,
        .myblue:hover,
        .mygreen:hover {
            color: white;
            font-weight: bold;
            font-size: 50px !important;
            z-index: 150;
        }
    </style>
</head>

<body>
    <h1>position속성</h1>
    <div id="box">
        <p class="myred">red</p>
        <p class="myblue">blue</p>
        <p class="mygreen">green</p>
    </div>
</body>

</html>
