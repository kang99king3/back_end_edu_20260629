<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        main {
            border: 1px solid red;
            width: 1000px;
            /*위아래 양쪽*/
            margin: 0 auto;
        }

        h1 {
            text-align: center;
        }

        /*
        reset 코드
        */
        * {
            margin: 0;
            padding: 0;
        }

        /* 공통 박스 스타일 */
        .container {
            background-color: antiquewhite;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px dashed cadetblue;
        }

        .content-box {
            width: 300px;
            height: 200px;
            background-color: aqua;
            border: 2px solid red;
            padding: 10px;
        }

        .border-box {
            width: 300px;
            height: 200px;
            background-color: aqua;
            border: 5px solid red;
            padding: 20px;
        }

        /* box의 width값 기준 설정*/
        .content-box,
        .border-box {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <main>
        <h1>BOX Model</h1>
        <div class="container">
            <div class="my-box content-box">
                BOX1
            </div>
        </div>

        <div class="container">
            <div class="my-box border-box">
                BOX2
            </div>
        </div>
    </main>

</body>

</html>
