<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        .c {
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            font-variant: small-caps;
            line-height: 50px;
            /* 맑은 고딕체가 없으면 굴림을 사용*/
            font-family: "맑은 고딕" 굴림;
        }

        /*
            font 축약형은 순서를 지켜야 한다.
            1.font : [font-weight / font-style / font variant]
            2.font : [font-size / line-height]
            3.font : [font-family]
            font : 1 2 3 순으로 작성해야 함
        */
        .c {
            font: bold italic small-caps 30px/50px '맑은 고딕';
        }
    </style>
</head>

<body>
    <p class="c">
        [korea] 먼저 2018 러시아 월드컵 직전 치른 북아일랜드 평가전 당시 발생한 '식사 누락'
        문제를 언급했다. 기성용은 "손흥민 선수와 인터뷰를 마치고 라커룸에 들어갔는데
        우리 둘만 김밥이 없었다"며 "경기에 져 기분도 좋지 않았고 바로 공항으로 이동해야
        하는 상황이라 화를 냈다"고 당시 상황을 설명했다.
    </p>

</body>

</html>
