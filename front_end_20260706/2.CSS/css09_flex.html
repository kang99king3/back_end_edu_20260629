<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: aquamarine;
            margin: 10px;
        }

        #container1 {
            border: 1px solid red;
            /*flex를 적용한다는 의미의 정의 개념*/
            display: flex;
            flex-direction: row-reverse;
        }

        #container2 {
            border: 1px solid red;
            /*flex를 적용한다는 의미의 정의 개념*/
            display: flex;
            flex-direction: column;
        }

        #container3 {
            border: 1px solid red;
            display: flex;
            flex-direction: column;
        }

        #header,
        #footer {
            width: 100%;
            height: 100px;
            background-color: aqua;
        }

        #content>div {
            width: 600px;
            background-color: blue;
            margin: 10px;
        }

        #content {
            display: flex;
            flex-direction: row;
            min-height: 80vh;
        }
    </style>
</head>

<body>
    <div id="container1">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
    <div id="container2">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
    <div id="container3">
        <div id="header">header</div>
        <div id="content">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
        <div id="footer">footer</div>
    </div>
</body>

</html>
