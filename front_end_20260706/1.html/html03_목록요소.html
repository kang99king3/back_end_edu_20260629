<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style type="text/css">
        li {
            list-style: none;
        }

        /* li요소의 자식요소를 선택 */
        li>ul {
            display: none;
        }

        b {
            cursor: pointer;
        }
    </style>
    <script type="text/javascript">
        //onload : 페이지가 로딩됐을 때 실행을 하겠다라는 이벤트속성
        window.onload = function () {
            document.querySelectorAll("b")[0].onclick = function () {
                document.querySelectorAll("li>ul")[0]
                    .style.display = "block";
            }

            document.querySelectorAll("b")[1].onclick = function () {
                document.querySelectorAll("li>ul")[1]
                    .style.display = "block";
            }
        }
    </script>
</head>

<body>
    <h1>비순차적 목록요소</h1>
    <ul>
        <li>
            <b>JAVA</b>
            <ul class="submenu">
                <li>변수의 사용</li>
                <li>제어문</li>
                <li>객체지향[상속,은닉성,다형성]</li>
            </ul>
        </li>
        <li>
            <b>데이터베이스</b>
            <ul>
                <li>환경설정</li>
                <li>DB모델링의 개념</li>
                <li>DML/DDL/DCL</li>
                <li>테이블/뷰/프로시져</li>
            </ul>
        </li>
        <li>HTML</li>
        <li>CSS</li>
    </ul>
</body>

</html>
